# cliff.toml
# Configuration for git-cliff changelog generator
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

---
"""
body = """
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/elichter/patent-lookup-tool/commit/{{ commit.id }}))
{%- endfor %}
{% endfor %}
"""
footer = """
---
{% for release in releases %}
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/elichter/patent-lookup-tool/releases/tag/{{ release.version }}
{% endfor %}
[Unreleased]: https://github.com/elichter/patent-lookup-tool/compare/{{ releases | first | map(attribute="version") | first }}...HEAD
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
    { message = "^feat",     group = "Added" },
    { message = "^add",      group = "Added" },
    { message = "^fix",      group = "Fixed" },
    { message = "^bug",      group = "Fixed" },
    { message = "^perf",     group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^change",   group = "Changed" },
    { message = "^update",   group = "Changed" },
    { message = "^remove",   group = "Removed" },
    { message = "^deprecat", group = "Deprecated" },
    { message = "^doc",      group = "Documentation" },
    { message = "^readme",   group = "Documentation" },
    { message = "^test",     group = "Testing" },
    { message = "^chore",    skip = true },
    { message = "^ci",       skip = true },
]
filter_commits = false
tag_pattern = "v[0-9].*"
